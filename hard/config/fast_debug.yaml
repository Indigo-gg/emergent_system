# Fast Debug Profile — quick iteration, small scale
# Usage: python -m src.main --mode evolution --config config/fast_debug.yaml

experiment:
  name: "debug-fast"
  seed: 42

simulation:
  num_particles: 5000
  particle_state_dim: 4
  dt: 0.01
  steps_per_eval: 1000
  boundary: "periodic"
  damping_gamma: 0.1
  bucket_max: 128

world:
  width: 100.0
  height: 100.0
  cell_size: 2.0

environment:                        # v6: nutrient + waste field layer
  nutrient_diffuse_rate: 0.08
  nutrient_decay_rate: 0.001
  nutrient_inject_interval: 60
  nutrient_patch_count: 5
  nutrient_patch_amount: 1.5
  nutrient_drift_speed: 0.002
  waste_production_rate: 0.15
  waste_diffuse_rate: 0.05
  waste_decay_rate: 0.005
  waste_metabolism_factor: 2.0
  base_metabolism: 0.01
  move_cost: 0.005
  absorb_rate: 0.5
  dormant_metabolism: 0.001
  max_dormant_ticks: 600

gep:
  terminal_set: ["dist", "density", "speed", "angle", "state_0", "state_1", "state_2", "state_3", "neighbor_count", "avg_nutrient", "avg_waste"]
  terminal_set_chemotaxis: ["grad_nut_x", "grad_nut_y", "grad_waste_x", "grad_waste_y", "nutrient", "waste", "speed"]
  function_set: ["+", "-", "*", "sin", "cos", "tanh", "sqrt", "abs", "max", "min"]
  constant_range: [-5.0, 5.0]
  max_tree_depth: 8
  head_length: 6
  bytecode_length: 64
  vm_stack_depth: 16

evolution:
  population_size: 5
  constant_penalty: 0.1     # fitness multiplier for constant formulas (0.1 = 90% penalty)
  mutation_rates:
    point_mutation: 0.30
    constant_finetune: 0.20
    is_transposition: 0.15
    ris_transposition: 0.10
    one_point_recombination: 0.15
    two_point_recombination: 0.10
  parsimony_pressure: 0.001

map_elites:
  grid_features: ["entropy", "islands", "fft_freq"]
  resolution_per_dim: 5       # 5³ = 125 cells (fast)
  all_features: ["entropy", "islands", "fft_freq", "angular_skew", "density_lap_var",
                 "survival_decay", "nutrient_consume_mean", "waste_peak_mean", "energy_skew"]

novelty:
  behavior_vector_dim: 15
  k_neighbors: 5
  threshold_adaptive: true
  stale_generations: 5
  sample_interval: 100
  grid_selection_prob: 0.7
  min_survival_rate: 0.1
  min_speed_variance: 0.0001
  max_entropy_ratio: 0.95
  min_nutrient_consume: 0.001
  max_energy_skew: 3.0

rendering:
  resolution: [128, 128]
  trajectory_frames: 100
  gif_frames: 50
  gif_fps: 10

safety:
  clamp_min: -100.0
  clamp_max: 100.0
  nan_penalty: 0.0
  max_force: 10.0
  max_speed: 5.0
  max_displacement_ratio: 0.5

vlm:
  provider: "ollama"
  model: "qwen2.5vl:3b"
  base_url: "http://localhost:11434"
  daily_limit: 50
  max_per_generation: 3      # max VLM calls per generation (token budget control)
  min_novelty_gap: 0.1       # lower threshold for VLM calls

checkpoint:
  interval: 50
  max_keep: 3

monitoring:
  gpu_temp_threshold: 85
  disk_min_gb: 2
  stale_generations: 5
  formula_max_depth: 15
